services:
  todo-service:
    container_name: todo-service
    extra_hosts:
      - host.docker.internal:host-gateway # Required for linux based systems not running docker desktop
    image: virabshetkar/todo-service:region-one-dev
    environment:
      - ASPNETCORE_URLS=http://+:8080 # '+' is required for host binding
      - ASPNETCORE_ENVIRONMENT=Development
      - USE_REMOTE_CONFIG=true
      - REMOTE_CONFIG_URL=http://reverse-proxy/config/services/todo-service/ # Trailing slash is required
    networks:
      - local-network

networks:
  local-network:
    external: true