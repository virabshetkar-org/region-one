name: CICD (Configuration)

run-name: ${{github.sha}} -- Configuration

on:
  workflow_dispatch:
    inputs:
      commitId:
        type: string 
        description: Current repo commitId to deploy
        required: false

  push:
    branches: 
     - main
    paths:
     - '/appconfig/**'

jobs:
  deploy:
    runs-on: [self-hosted, deploy]
    steps:
      - name: Checkout branch
        if: ${{inputs.commitId != null}}
        uses: actions/checkout@v6
        with:
          path: configuration
          ref: ${{inputs.commitId || github.sha}}
      - name: Copy configs
        working-directory: configuration
        run: | 
          mkdir -p /var/www/region-one-config/${{inputs.commitId}}
          rm -rf /var/www/region-one-config/${{inputs.commitId}}/*
          cp -r ./appconfig/* /var/www/region-one-config/${{inputs.commitId}}
          ln -sfn ./${{inputs.commitId}} /var/www/region-one-config/current
