include conf.d/maps/default.conf;

server {
    listen 80;
    listen [::]:80;

    server_name _;
    include conf.d/vars/default.conf;

    location /config/ {
        alias /usr/share/nginx/config/;
        autoindex off;
        default_type application/json;
    }

    include conf.d/backend/services.conf;

    location / {
        root /usr/share/nginx/html/shell/;
        try_files $uri $uri/ /index.html;
    }
}
